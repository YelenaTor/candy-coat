name: Release CandyCoat (Testing)

# Trigger by pushing a v*-testing tag, e.g. v0.17.0-testing
# This builds from the candy-coat-testing branch, uploads the zip,
# and updates repo.json on GitHub Pages with TestingAssemblyVersion + DownloadLinkTesting.

on:
  push:
    tags:
      - 'v*-testing'
  workflow_dispatch:

jobs:
  build_testing:
    runs-on: windows-2022
    permissions:
      contents: write

    env:
      Solution_Name: CandyCoat
      Plugin_Name: CandyCoat

    steps:
    - name: Checkout candy-coat-testing branch
      uses: actions/checkout@v4
      with:
        ref: candy-coat-testing
        submodules: recursive

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        quality: preview

    - name: Download Dalamud
      run: |
        Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
        Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

    - name: Cache NuGet Packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Build with dotnet
      run: |
        dotnet restore
        dotnet build CandyCoat/CandyCoat.csproj --configuration Release --output ./publish

    - name: Create testing ZIP and updated repo.json
      run: |
        # Parse testing version from tag, e.g. v0.17.0-testing -> 0.17.0
        $tag = "${{ github.ref_name }}"
        $version = $tag.TrimStart('v') -replace '-testing$', ''
        $outDir = "./publish"
        $zipName = "CandyCoat-testing.zip"
        $manifestPath = "$outDir/CandyCoat.json"

        Get-ChildItem -Path $outDir -Filter "*.zip" -Recurse | Remove-Item -Force

        # Extract testing changelog section from CHANGELOG.md
        $changelogText = ""
        $lines = Get-Content "CHANGELOG.md"
        $inSection = $false
        foreach ($line in $lines) {
          if ($line -match "^## \[$version\]") { $inSection = $true; continue }
          elseif ($inSection -and $line -match "^## \[") { break }
          elseif ($inSection) { $changelogText += $line + "`n" }
        }
        $changelogText = $changelogText.Trim()
        if (-not $changelogText) { $changelogText = "Testing build $version." }

        # Build testing zip (same staging approach as stable)
        $stagingDir = "./staging"
        New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
        Get-ChildItem -Path $outDir -File | Where-Object { $_.Extension -in @('.dll','.json','.pdb','.xml') } | Copy-Item -Destination $stagingDir
        if (Test-Path "$outDir/Fonts") {
          Copy-Item -Path "$outDir/Fonts" -Destination "$stagingDir/Fonts" -Recurse
        }
        Compress-Archive -Path "$stagingDir/*" -DestinationPath $zipName -Force

        # Build a repo.json that merges testing fields into the current manifest.
        # We fetch the current stable repo.json from GitHub Pages to preserve stable fields.
        $stableRepoUrl = "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/repo.json"
        try {
          $stableRepo = Invoke-RestMethod -Uri $stableRepoUrl -ErrorAction Stop
          $entry = $stableRepo[0]
        } catch {
          Write-Host "Could not fetch stable repo.json — using local manifest as base."
          $entry = Get-Content $manifestPath | ConvertFrom-Json
        }

        $testingDownloadUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$zipName"
        $entry | Add-Member -Force -NotePropertyName "TestingAssemblyVersion" -NotePropertyValue "$version.0"
        $entry | Add-Member -Force -NotePropertyName "DownloadLinkTesting" -NotePropertyValue $testingDownloadUrl
        $entry | Add-Member -Force -NotePropertyName "TestingChangelog" -NotePropertyValue $changelogText

        $repoArray = @($entry)
        ConvertTo-Json -InputObject $repoArray -Depth 10 | Set-Content "repo.json"

        Write-Host "Testing version: $version"
        Write-Host "DownloadLinkTesting: $testingDownloadUrl"

    - name: Upload repo.json as artifact
      uses: actions/upload-artifact@v4
      with:
        name: repo-json-testing
        path: repo.json

    - name: Create GitHub Pre-release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          CandyCoat-testing.zip
          repo.json
        draft: false
        prerelease: true

  deploy_pages:
    needs: build_testing
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download repo.json artifact
        uses: actions/download-artifact@v4
        with:
          name: repo-json-testing
          path: public

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
